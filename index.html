<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Router</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body{margin:0;overflow:hidden}

#info{
position:fixed;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:8px;
font-family:sans-serif;
}
</style>

</head>

<body>

<div id="info">
AR Router Demo<br>
Камераа Hiro marker дээр чиглүүл
</div>

<a-scene
embedded
arjs="sourceType: webcam; debugUIEnabled:false;"
vr-mode-ui="enabled:false">

<a-marker preset="hiro">

<!-- ROUTER -->

<a-box
position="0 0.05 0"
depth="0.25"
height="0.08"
width="0.35"
color="#333">
</a-box>

<!-- ports -->

<a-box position="-0.15 0.05 0.12" depth="0.03" height="0.03" width="0.03" color="orange"></a-box>
<a-box position="-0.1 0.05 0.12" depth="0.03" height="0.03" width="0.03" color="orange"></a-box>
<a-box position="-0.05 0.05 0.12" depth="0.03" height="0.03" width="0.03" color="orange"></a-box>
<a-box position="0 0.05 0.12" depth="0.03" height="0.03" width="0.03" color="orange"></a-box>

<!-- antennas -->

<a-cylinder
position="-0.1 0.15 0"
radius="0.01"
height="0.2"
color="black">
</a-cylinder>

<a-cylinder
position="0.1 0.15 0"
radius="0.01"
height="0.2"
color="black">
</a-cylinder>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
