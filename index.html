<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Markerгүй AR Router</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body{
      margin:0;
      font-family:system-ui,Segoe UI,Roboto,Arial;
      background:#0b0b0b;
      color:#fff;
    }
    header{
      padding:12px 14px;
      background:#111;
      position:sticky;
      top:0;
      z-index:5;
      border-bottom:1px solid rgba(255,255,255,.12);
    }
    header b{display:block;margin-bottom:4px}
    header small{opacity:.85}

    .wrap{
      padding:14px;
      max-width:980px;
      margin:0 auto;
    }

    model-viewer{
      width:100%;
      height:72vh;
      background:#f2f2f2;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      overflow:hidden;
    }

    .hotspot{
      width:28px;
      height:28px;
      border-radius:50%;
      border:none;
      background:#ff4d4f;
      color:#fff;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      box-shadow:0 2px 8px rgba(0,0,0,.35);
    }

    .info-box{
      margin-top:12px;
      padding:12px 14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      border-radius:12px;
      color:#fff;
      max-width:420px;
      line-height:1.4;
    }

    .hidden{
      display:none;
    }
  </style>
</head>

<body>
  <header>
    <b>Markerгүй AR — Router</b>
    <small><b>View in AR</b> → ширээн дээр тавь → портыг дарж тайлбар үзнэ.</small>
  </header>

  <div class="wrap">
    <model-viewer
      id="mv"
      src="./routerAR.glb"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-placement="floor"
      camera-controls
      shadow-intensity="1"
      shadow-softness="1"
      exposure="1"
      environment-image="neutral"
      scale="0.1 0.1 0.1"
      alt="Router model">

      <button
        class="hotspot"
        slot="hotspot-port1"
        data-position="0m 0.02m 0.18m"
        data-normal="0m 0m 1m"
        onclick="toggleInfo('portInfo')">
        ●
      </button>

    </model-viewer>

    <div id="portInfo" class="info-box hidden">
      Энэ бол <b>порт</b>. Энд Ethernet кабель холбоно.
    </div>
  </div>

  <script>
    const mv = document.getElementById('mv');

    function toggleInfo(id){
      const el = document.getElementById(id);
      el.classList.toggle('hidden');
    }

    mv.addEventListener('load', () => {
      mv.cameraOrbit = "45deg 70deg 2.5m";
      mv.fieldOfView = "30deg";
    });
  </script>
</body>
</html>
