<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Markerгүй AR (iPhone Quick Look)</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;}
    header{padding:12px 14px;background:#111;color:#fff;}
    header b{display:block;margin-bottom:4px}
    header small{opacity:.85}
    .wrap{padding:14px}
    model-viewer{
      width:100%;
      height:75vh;
      background:#f2f2f2;
      border:1px solid #ddd;
      border-radius:14px;
    }
  </style>
</head>

<body>
  <header>
    <b>Markerгүй AR (iPhone)</b>
    <small>Safari → “View in AR” → ширээн дээр тавиад хуруугаар эргүүл/томруул.</small>
  </header>

  <div class="wrap">
    <model-viewer
      src="./switch.glb"
      ios-src="./switch.usdz"
      ar
      ar-modes="quick-look"
      camera-controls
      shadow-intensity="0.6"
      alt="Switch model">
    </model-viewer>
  </div>
</body>
</html>
